# =============================================================================
# Autor: rag
#
# O que é:
# - Arquivo de configuração do Hyprland usado pelo módulo Home Manager deste repo.
#
# Por quê:
# - Mantém bindings, regras e defaults versionados e reproduzíveis.
# - Evita ajustes manuais pós-rebuild em cada máquina.
#
# Como:
# - Este arquivo é instalado via `xdg.configFile` no módulo do Hyprland.
# - As seções abaixo organizam: autostart, input, aparência, regras e atalhos.
#
# Riscos:
# - Mudanças aqui impactam diretamente a sessão gráfica (pode impedir login).
# - Algumas teclas/comandos dependem de ferramentas externas (wl-copy, grimblast, etc.).
# =============================================================================

# Inicialização automática de apps
exec-once = uwsm app -- hyprpaper
exec-once = uwsm app -- hypridle
exec-once = uwsm app -- gnome-keyring-daemon --start --components=secrets
exec-once = uwsm app -- nm-applet --indicator
exec-once = uwsm app -- wlsunset -l 52.23 -L 21.01

# Configurações de entrada (teclado/mouse)
input {
    kb_layout = pl,ru
    kb_options = grp:win_space_toggle
    repeat_delay = 250
    repeat_rate = 40

    follow_mouse = 1
    mouse_refocus = false

    touchpad {
        natural_scroll = true
    }

    sensitivity = 0
    accel_profile = flat
}

# Configurações gerais
general {
    border_size = 1
    col.active_border = rgb(b7bdf8)
    gaps_in = 3
    gaps_out = 3
    layout = master
}

# Decorações de janela
decoration {
    rounding = 8
    blur {
        enabled = false
        size = 3
        passes = 1
    }
    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

# Animações
animations {
    enabled = false
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# Layouts
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    orientation = left
    mfact = 0.50
}

# Gestos do mouse
gesture = 3, horizontal, workspace

# Outras configurações
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 2
}

device {
  name = epic-mouse-v1
  sensitivity = -0.5
}

# Regras de janela
# Centralizar janelas específicas
windowrule = center 1, class:^(.blueman-manager-wrapped)$
windowrule = center 1, class:^(gnome-calculator|org\.gnome\.Calculator)$
windowrule = center 1, class:^(nm-connection-editor)$
windowrule = center 1, class:^(org.pulseaudio.pavucontrol)$
windowrule = center 1, initialTitle:^(Study Deck)$
windowrule = center 1, initialTitle:^(_crx_.*)$
windowrule = center 1, title:.*\.exe

# Flutuar janelas específicas
windowrule = float, class:^(.blueman-manager-wrapped)$
windowrule = float, class:^(gnome-calculator|org\.gnome\.Calculator)$
windowrule = float, class:^(nm-connection-editor)$
windowrule = float, class:^(org.pulseaudio.pavucontrol)$
windowrule = float, title:^(Albert)$
windowrule = float, initialTitle:^(_crx_.*)$
windowrule = float, title:^(Select what to share)$

# Remover borda de apps específicos
windowrule = noborder, title:^(Albert)$
windowrule = noborder, title:^(.*is sharing (your screen|a window)\.)$

# Definir tamanho de janelas específicas
windowrule = size 50%, class:^(.blueman-manager-wrapped)$
windowrule = size 50%, class:^(nm-connection-editor)$
windowrule = size 50%, class:^(org.pulseaudio.pavucontrol)$

# Manter foco em janelas específicas quando abrirem
windowrule = stayfocused, class:^(swappy)$
windowrule = stayfocused, title:^(Albert)$

# Atribuir apps a workspaces específicas
windowrule = workspace 1, class:^(brave-browser)$
windowrule = workspace 2, class:^(WezTerm)$
windowrule = workspace 3, class:^(org\.telegram\.desktop)$
windowrule = workspace 4, class:^(com\.obsproject\.Studio)$
windowrule = workspace 4 silent, class:^(steam)$
windowrule = workspace 5 silent, class:^(zoom)$
windowrule = workspace 5, class:^(steam_app_\d+)$
windowrule = workspace special silent, title:^(.*is sharing (your screen|a window)\.)$
windowrule = workspace special, class:^(gnome-pomodoro)$

# Mostrar app em todas as workspaces (pin)
windowrule = pin, title:^(as_toolbar)$

# Atalhos
$mainMod = SUPER

bind = $mainMod SHIFT, Return, exec, warp-terminal
bind = $mainMod SHIFT, B, exec, brave
bind = $mainMod SHIFT, F, exec, nautilus
bind = $mainMod SHIFT, T, exec, Telegram
bind = CTRL ALT, P, exec, gnome-pomodoro --start-stop
bind = $mainMod, Return, layoutmsg, swapwithmaster
bind = $mainMod, R, layoutmsg, orientationcycle
bind = $mainMod, Q, killactive,
bind = CTRL ALT, Q, exit
bind = $mainMod, F, togglefloating
bind = $mainMod, M, fullscreen
bind = $mainMod SHIFT, M, movetoworkspacesilent, special
bind = $mainMod SHIFT, P, togglespecialworkspace
bind = $mainMod SHIFT, C, exec, hyprpicker -a
bind = $mainMod SHIFT, Backspace, exec, swaync-client -C

# Mover foco com mainMod + setas
bind = $mainMod, l, movefocus, l
bind = $mainMod, h, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Redimensionar janelas
bind = $mainMod SHIFT, left, resizeactive, -50 0
bind = $mainMod SHIFT, right, resizeactive, 50 0
bind = $mainMod SHIFT, up, resizeactive, 0 -50
bind = $mainMod SHIFT, down, resizeactive, 0 50

# Alternar workspaces com mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Mover janela ativa para uma workspace com mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Navegar pelas workspaces existentes com mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mover/redimensionar janelas com mainMod + LMB/RMB e arrastar
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Menu de aplicativos
bind = $mainMod, A, exec, albert show "apps "

# Centralizar a janela em foco
bind = CTRL ALT, C, centerwindow

bind = ALT SHIFT, V, exec, cliphist list | wofi --show dmenu | cliphist decode | wl-copy

# Launcher do Albert
bind = CTRL, Space, exec, albert toggle

# Captura de área
bind = $mainMod SHIFT, S, exec, grimblast -f save area - | swappy -f -

# Captura da tela inteira
bind = $mainMod CTRL, S, exec, grimblast -f save output - | swappy -f -

# Gravação de tela
bind = $mainMod SHIFT, R, exec, $HOME/.local/bin/screen-recorder

# OCR
bind = ALT SHIFT, 2, exec, $HOME/.local/bin/ocr

# Bloquear a tela
bind = CTRL ALT, L, exec, $HOME/.local/bin/dynamic-hyprlock

# Ajustar brilho
bind = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# Abrir notificações
bind = $mainMod, N, exec, swaync-client -t -sw

# Ajustar volume
bind = , XF86AudioRaiseVolume, exec, pamixer --increase 5
bind = , XF86AudioLowerVolume, exec, pamixer --decrease 5
bind = , XF86AudioMute, exec, pamixer --toggle-mute
bind = , XF86AudioMicMute, exec, pamixer --default-source --toggle-mute

# Ajustar sensibilidade do microfone
bind = SHIFT, XF86AudioRaiseVolume, exec, pamixer --increase 5 --default-source
bind = SHIFT, XF86AudioLowerVolume, exec, pamixer --decrease 5 --default-source

# Ajustar luz do teclado
bind = SHIFT, XF86MonBrightnessUp, exec, brightnessctl -d tpacpi::kbd_backlight set +33%
bind = SHIFT, XF86MonBrightnessDown, exec, brightnessctl -d tpacpi::kbd_backlight set 33%-
