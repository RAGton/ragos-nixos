# Flags do VSCode (Electron) para Wayland
# Mantemos somente opções amplamente suportadas para evitar warnings no startup.
# Se algum Electron antigo ignorar uma flag, ela é simplesmente descartada.

# Preferir hint ao invés de forçar `--ozone-platform=wayland` (reduz warnings e funciona em X11/Wayland).
--ozone-platform-hint=auto

# Wayland window decorations (quando suportado pelo Electron/Chromium na build do nixpkgs).
--enable-features=UseOzonePlatform,WaylandWindowDecorations
