# =============================================================================
# Hyprland config (base)
# Autor: Gabriel Rocha (rag) + Codex
# Data: 2026-03-12
#
# Referenciado por `desktop/hyprland/user.nix` via `extraConfig`.
# DMS e outros rices fazem source de snippets em ~/.config/hypr/dms/
# =============================================================================

# Monitor (generico — ajuste por host via kanshi ou monitor=)
monitor=,preferred,auto,1

# =============================================================================
# Autostart — servicos de sessao
# Todos via `uwsm app --` para integracao correta com UWSM + systemd-user.
# NOTA: servicos que usam systemd.enable (waybar, cliphist, kanshi, swaync)
#       sao gerenciados automaticamente pelo systemd-user apos o graphical-session.target;
#       NAO devem ser duplicados aqui.
# NOTA: o handoff da sessao para systemd-user ja vem de UWSM + Home Manager;
#       nao reiniciar `hyprland-session.target` manualmente aqui.
# NOTA: com DMS upstream ativo, wallpaper/launcher/notificacoes/clipboard
#       sao providos pelo proprio DMS.
# =============================================================================
exec-once = uwsm app -- hypridle
exec-once = uwsm app -- nm-applet --indicator

# =============================================================================
# Input
# =============================================================================
input {
  kb_layout   = br
  kb_variant  = abnt2
  repeat_delay = 250
  repeat_rate  = 40
  follow_mouse = 1
  mouse_refocus = false
  sensitivity  = 0
  accel_profile = flat

  touchpad {
    natural_scroll    = true
    disable_while_typing = true
    tap-to-click      = true
    scroll_factor     = 0.5
  }
}

# =============================================================================
# Geral
# =============================================================================
general {
  gaps_in   = 4
  gaps_out  = 8
  border_size = 2
  col.active_border   = rgba(7aa2f7ff) rgba(bb9af7ff) 45deg
  col.inactive_border = rgba(414868aa)
  layout = master
  resize_on_border = true
  allow_tearing    = false   # true somente em host com tearing explicito (Glacier)
}

# =============================================================================
# Decoracao
# =============================================================================
decoration {
  rounding = 10

  blur {
    enabled  = true
    size     = 2
    passes   = 1
    noise    = 0.01
    contrast = 0.9
    brightness = 0.85
    popups   = false
  }

  shadow {
    enabled      = false
    range        = 8
    render_power = 3
    color        = rgba(1a1a2eee)
  }

  # Em iGPU, dim global + blur + opacidade global somam custo visual
  # sem ganho real de fluidez. Mantemos o rice, mas tiramos o excesso.
  dim_inactive   = false
  dim_strength   = 0.0

  active_opacity   = 1.0
  inactive_opacity = 1.0
}

# =============================================================================
# Zen Browser (Flatpak) - transparência leve
# Mantém leitura confortável e ainda integra com o visual do DMS.
# =============================================================================
windowrule = match:class ^(app\.zen_browser\.zen|zen|Zen)$, opacity 0.93 0.86

# =============================================================================
# Dolphin - transparência leve para o gerenciador de arquivos padrão
# =============================================================================
windowrule = match:class ^(org\.kde\.dolphin)$, opacity 0.93 0.85

# =============================================================================
# Filelight - ferramenta de análise de disco
# =============================================================================
windowrule = match:class ^(org\.kde\.filelight)$, opacity 0.95 0.90

# =============================================================================
# VS Code Insiders - transparência controlada pelo Hyprland
# Mais confiável que depender de hacks do editor no Wayland.
# =============================================================================
windowrule = match:class ^(code-insiders)$, opacity 0.90 0.90

# =============================================================================
# Animacoes
# =============================================================================
animations {
  enabled = true

  bezier = snap,    0.05, 0.9, 0.1, 1.05
  bezier = smooth,  0.25, 0.1, 0.25, 1.0
  bezier = oversh,  0.34, 1.56, 0.64, 1.0

  animation = windows,    1, 4,  snap,   slide
  animation = windowsOut, 1, 3,  smooth, popin 80%
  animation = border,     1, 8,  smooth
  animation = fade,       1, 4,  smooth
  animation = workspaces, 1, 4,  smooth, slide
  animation = layers,     1, 3,  smooth, slide
}

# =============================================================================
# Layout
# =============================================================================
master {
  orientation = left
  mfact        = 0.55
  new_status   = slave
}

dwindle {
  pseudotile     = true
  preserve_split = true
}

# =============================================================================
# Misc
# =============================================================================
misc {
  force_default_wallpaper    = 0
  disable_hyprland_logo      = true
  disable_splash_rendering   = true
  vrr                        = 1       # VRR/FreeSync quando disponivel
  vfr                        = false   # prioriza fluidez constante sobre economia em idle
  mouse_move_enables_dpms    = true
  key_press_enables_dpms     = true
  focus_on_activate          = true
  animate_manual_resizes     = false
  enable_swallow             = true
  swallow_regex              = ^(tilix|com\.gexperts\.Tilix|alacritty|kitty|foot)$
}

# =============================================================================
# Gestos (touchpad)
# =============================================================================
gestures {
  workspace_swipe_distance     = 300
  workspace_swipe_cancel_ratio = 0.3
}

# Gesto de 3 dedos para trocar workspace (API atual do Hyprland 0.53+)
gesture = 3, horizontal, workspace

# =============================================================================
# Env vars exportadas para processos filhos (complementa systemd via --all)
# =============================================================================
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# =============================================================================
# DMS (DankMaterialShell)
# Os snippets sao criados pelo activation script do Home Manager.
# Se estiverem vazios, o Hyprland simplesmente ignora (nenhuma config extra).
# =============================================================================
source = ~/.config/hypr/dms/layout.conf
source = ~/.config/hypr/dms/colors.conf
source = ~/.config/hypr/dms/binds.conf
source = ~/.config/hypr/dms/windowrules.conf

# =============================================================================
# Atalhos (custom — workspaces, janelas, launcher, clipboard, codex)
# =============================================================================
$mainMod = SUPER

# --- Janela ---------------------------------------------------------------
bind = $mainMod, Q, killactive,
bind = $mainMod, F, togglefloating,
bind = $mainMod, M, fullscreen, 0
bind = $mainMod, Return, layoutmsg, swapwithmaster
bind = $mainMod, R, layoutmsg, orientationcycle
bind = $mainMod, Tab, exec, uwsm app -- rag-window-menu
bind = $mainMod SHIFT, M, movetoworkspacesilent, special
bind = $mainMod SHIFT, P, togglespecialworkspace
bind = CTRL ALT, Q, exit

# Centralizar janela
bind = CTRL ALT, C, centerwindow

# --- Foco (hjkl) -----------------------------------------------------------
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# --- Redimensionar ---------------------------------------------------------
bind = $mainMod SHIFT, left,  resizeactive, -50 0
bind = $mainMod SHIFT, right, resizeactive,  50 0
bind = $mainMod SHIFT, up,    resizeactive,  0 -50
bind = $mainMod SHIFT, down,  resizeactive,  0  50

# --- Mouse -----------------------------------------------------------------
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Workspaces ------------------------------------------------------------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll para navegar
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# --- Apps rapidos ----------------------------------------------------------
bind = $mainMod, E, exec, uwsm app -- dolphin
bind = $mainMod, T,          exec, uwsm app -- rag-terminal
bind = $mainMod, D,          exec, uwsm app -- rag-quick-actions
bind = $mainMod, C,          exec, uwsm app -- rag-calc-menu
bind = $mainMod SHIFT, B,      exec, uwsm app -- brave
bind = $mainMod SHIFT, F,      exec, uwsm app -- dolphin
bind = $mainMod SHIFT, G,      exec, uwsm app -- codex
bind = $mainMod CTRL, E,       exec, uwsm app -- filelight

# --- Launcher / Clipboard (DMS) -------------------------------------------
bind = $mainMod, A,     exec, dms ipc launcher toggle
bind = ALT SHIFT, V,    exec, dms ipc clipboard toggle
bind = $mainMod, V,     exec, uwsm app -- rag-clipboard-menu
bind = $mainMod, N,     exec, dms ipc notifications toggle

# --- Utilidades ------------------------------------------------------------
bind = $mainMod SHIFT, S,    exec, uwsm app -- rag-screenshot edit-area
bind = $mainMod CTRL,  S,    exec, uwsm app -- rag-screenshot edit-output
bind = $mainMod SHIFT, R,    exec, $HOME/.local/bin/screen-recorder
bind = $mainMod CTRL,  R,    exec, uwsm app -- rag-record-menu
bind = $mainMod, L,          exec, loginctl lock-session
bind = CTRL ALT, L,          exec, loginctl lock-session
bind = $mainMod, X,          exec, uwsm app -- rag-power-menu
bind = $mainMod, O,          exec, uwsm app -- rag-audio-menu
bind = $mainMod, W,          exec, uwsm app -- rag-network-menu
bind = $mainMod SHIFT, C,    exec, hyprpicker -a
bind = $mainMod SHIFT, Backspace, exec, dms ipc notifications clearAll
bind = CTRL ALT, P,          exec, gnome-pomodoro --start-stop
bind = ALT SHIFT, 2,         exec, $HOME/.local/bin/ocr

# Print Screen (Wayland)
# - Print: seleção (copia)
# - Super+Print: tela inteira (salva + copia)
# - Super+Shift+Print: janela ativa (salva + copia)
bind = , Print,              exec, uwsm app -- rag-screenshot copy-area
bind = $mainMod, Print,      exec, uwsm app -- rag-screenshot copysave-screen
bind = $mainMod SHIFT, Print, exec, uwsm app -- rag-screenshot copysave-active

# --- Brilho ----------------------------------------------------------------
bindel = , XF86MonBrightnessUp,   exec, uwsm app -- rag-brightness up
bindel = , XF86MonBrightnessDown, exec, uwsm app -- rag-brightness down
bindel = SHIFT, XF86MonBrightnessUp,   exec, uwsm app -- rag-kbd-brightness up
bindel = SHIFT, XF86MonBrightnessDown, exec, uwsm app -- rag-kbd-brightness down

# --- Volume ----------------------------------------------------------------
bind = , XF86AudioRaiseVolume, exec, pamixer --allow-boost --set-limit 130 --increase 5
bind = , XF86AudioLowerVolume, exec, pamixer --allow-boost --set-limit 130 --decrease 5
bind = , XF86AudioMute,        exec, pamixer --toggle-mute
bind = , XF86AudioMicMute,     exec, pamixer --default-source --toggle-mute
bind = SHIFT, XF86AudioRaiseVolume, exec, pamixer --increase 5 --default-source
bind = SHIFT, XF86AudioLowerVolume, exec, pamixer --decrease 5 --default-source
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
