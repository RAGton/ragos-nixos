# =============================================================================
# Hyprland config (base)
#
# Este arquivo é referenciado por `desktop/hyprland/user.nix` via:
#   xdg.configFile."hypr/hyprland.conf".source = ./hyprland.conf;
#
# Objetivo:
# - Fornecer um config mínimo e estável para avaliação/build.
# - Permitir que rices (ex.: DMS) adicionem/override via `extraConfig`/includes.
#
# Nota:
# - Ajuste conforme necessário para seu workflow.
# =============================================================================

# Monitor (genérico)
monitor=,preferred,auto,1

# Exec / autostart (vazio por padrão)
# exec-once = ...

# Input básico
input {
  kb_layout = br
}

# Geral
general {
  gaps_in = 5
  gaps_out = 10
  border_size = 2
}

# Decoração
decoration {
  rounding = 8
}

# Animações (leve)
animations {
  enabled = true
}

# Binds mínimos
$mod = SUPER
bind = $mod, RETURN, exec, ${"$"}TERMINAL
bind = $mod, Q, killactive,
bind = $mod, M, exit,

# Fallback: se TERMINAL não estiver definido, você pode setar em env/exec

