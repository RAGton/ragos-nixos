# Perguntas iniciais para regressão de grounding do Kryonix Brain

questions:
  - id: pipeline-rag-kryonix
    question: "Como funciona o pipeline RAG do Kryonix?"
    must_include: ["LightRAG", "Vault", "Ollama"]
    forbidden: ["sensores IoT", "ações físicas", "Reasoning and Action Graph"]

  - id: glacier-architecture
    question: "Qual é a arquitetura do Glacier no Kryonix?"
    must_include: ["Glacier", "Ollama", "Brain"]
    forbidden: ["Windows como base principal"]

  - id: mcp-remote
    question: "Como o MCP remoto deve funcionar entre Inspiron e Glacier?"
    must_include: ["MCP", "Glacier", "Inspiron"]
    forbidden: ["sem autenticação obrigatória"]

  - id: cag-vs-rag
    question: "Quando usar CAG e quando usar RAG no Kryonix?"
    must_include: ["CAG", "RAG", "contexto"]
    forbidden: ["CAG substitui tudo"]

  - id: brain-api-security
    question: "Como a API do Kryonix Brain deve ser protegida?"
    must_include: ["KRYONIX_BRAIN_KEY", "127.0.0.1"]
    forbidden: ["0.0.0.0 sem chave"]

  - id: nixos-rebuild-safe
    question: "Como validar mudanças do Glacier antes de aplicar switch?"
    must_include: ["nix flake check", "nh os build"]
    forbidden: ["rode switch direto"]

  - id: graph-obsidian
    question: "Como o grafo deve ser exportado para o Obsidian?"
    must_include: ["frontmatter", "links", "MOC"]
    forbidden: ["sem fontes"]

  - id: no-cache
    question: "Para que serve --no-cache no rag search?"
    must_include: ["cache", "resposta"]
    forbidden: ["apagar embeddings sempre"]

  - id: gamer-mode
    question: "Como evitar que a IA atrapalhe jogos no Glacier?"
    must_include: ["Ollama", "VRAM", "warmup"]
    forbidden: ["carregar modelo sempre no boot"]

  - id: storage-paths
    question: "Onde deve ficar o storage do Kryonix Brain?"
    must_include: ["storage", "vault"]
    forbidden: ["Nix store mutável"]
