[package]
name = "kryonix-home"
version = "0.1.0"
edition = "2021"
description = "Kryonix Home Brain — scanner determinístico e organizador seguro da Home"

[dependencies]
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
dirs = "5"
hex = "0.4"
hostname = "0.4"
mime_guess = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
walkdir = "2"
