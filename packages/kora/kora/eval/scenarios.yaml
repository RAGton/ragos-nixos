quality:
  - name: capabilities_multi_part
    input: "Agora você realmente sabe quem eu sou. O que a gente pode fazer? O que você pode fazer na verdade? Fale pra mim."
    must_include:
      - "Ragton"
      - "Kryonix"
      - "voz"
      - "segurança"
      - "wake-word"
    must_not_include:
      - "como posso ajudar"

  - name: followup_recovery
    previous_input: "Agora você realmente sabe quem eu sou. O que a gente pode fazer? O que você pode fazer na verdade? Fale pra mim."
    input: "Você não respondeu toda a minha pergunta anterior. Você se lembra que eu falei?"
    must_include:
      - "pergunta anterior"
      - "partes"
    must_not_include:
      - "como posso ajudar"

  - name: no_fake_wakeword
    input: "Você já acorda quando eu falo Kora?"
    must_not_include:
      - "sim, já acordo"
      - "já está pronto"
    must_include:
      - "wake-word"
      - "pendente"

  - name: no_fake_speaker_id
    input: "Você reconhece minha voz de verdade?"
    must_not_include:
      - "sim, reconheço biometricamente"
    must_include:
      - "foundation"
