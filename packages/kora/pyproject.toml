[project]
name = "kora"
version = "0.1.0"
description = "Kora — Kryonix Personal Assistant (gateway/orchestrator)"
requires-python = ">=3.11"
license = { text = "Proprietary" }
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn>=0.27.0",
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
    "python-dotenv>=1.0.0",
    "pyaudio>=0.2.14",
    "edge-tts",
    "numpy",
]

[project.scripts]
kora-api = "kora.api.server:main"
kora = "kora.cli:main"
kora-memory-worker = "kora.memory.worker:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["kora"]
