name: Publish tagged releases to FlakeHub

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish to FlakeHub
        type: string
        required: true

concurrency:
  group: flakehub-publish-${{ inputs.tag || github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ inputs.tag && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - uses: DeterminateSystems/determinate-nix-action@v3

      - run: nix flake show --all-systems
      - run: nix flake check --keep-going

  publish:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ inputs.tag && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - uses: DeterminateSystems/determinate-nix-action@v3

      - uses: DeterminateSystems/flakehub-push@main
        with:
          visibility: public
          name: RAGton/kryonix
          tag: ${{ inputs.tag || github.ref_name }}
          include-output-paths: true
