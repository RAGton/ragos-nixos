<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#030712"/>
      <stop offset="1" stop-color="#0D1228"/>
    </linearGradient>
    <linearGradient id="cyanPurple" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00D1FF"/>
      <stop offset="1" stop-color="#8A5CFF"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#00D1FF" flood-opacity="0.14"/></filter>
  </defs>
  <rect width="1400" height="900" rx="28" fill="url(#bg)"/>
  <rect x="20" y="20" width="1360" height="860" rx="24" stroke="#1B3352" stroke-width="2"/>
  <text x="700" y="86" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="62" font-weight="800" fill="#EAF7FF">Kryonix Overview</text>
  <text x="700" y="126" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="#A4C6E8">Ecossistema declarativo para workstation, gaming, virtualização e IA local</text>

  <g transform="translate(76 180)" filter="url(#shadow)">
    <rect width="396" height="222" rx="24" fill="#091728" stroke="#1E5E95"/>
    <text x="42" y="64" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="700" fill="#8EDBFF">Workstation</text>
    <text x="42" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#D5EBFF">Ambiente estável e declarativo</text>
    <text x="42" y="136" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#D5EBFF">para produtividade, shells e</text>
    <text x="42" y="168" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#D5EBFF">fluxo técnico no dia a dia.</text>
    <rect x="42" y="188" width="132" height="6" rx="3" fill="#00D1FF"/>
  </g>

  <g transform="translate(502 180)" filter="url(#shadow)">
    <rect width="396" height="222" rx="24" fill="#0B1229" stroke="#5646C4"/>
    <text x="42" y="64" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="700" fill="#D0B4FF">Gaming</text>
    <text x="42" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#EADFFF">Host gamer com foco em</text>
    <text x="42" y="136" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#EADFFF">baixa latência, fluidez e</text>
    <text x="42" y="168" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#EADFFF">integração com o desktop.</text>
    <rect x="42" y="188" width="132" height="6" rx="3" fill="#8A5CFF"/>
  </g>

  <g transform="translate(928 180)" filter="url(#shadow)">
    <rect width="396" height="222" rx="24" fill="#091728" stroke="#1E5E95"/>
    <text x="42" y="64" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="700" fill="#8EDBFF">Virtualização</text>
    <text x="42" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#D5EBFF">Base para VMs, storage,</text>
    <text x="42" y="136" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#D5EBFF">libvirt, containers e</text>
    <text x="42" y="168" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#D5EBFF">laboratório do próprio projeto.</text>
    <rect x="42" y="188" width="132" height="6" rx="3" fill="#00D1FF"/>
  </g>

  <g transform="translate(76 436)" filter="url(#shadow)">
    <rect width="396" height="222" rx="24" fill="#091728" stroke="#1E5E95"/>
    <text x="42" y="64" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="700" fill="#8EDBFF">Desenvolvimento</text>
    <text x="42" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#D5EBFF">Ferramentas modernas,</text>
    <text x="42" y="136" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#D5EBFF">flake, formatter, checks</text>
    <text x="42" y="168" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#D5EBFF">e overlays reutilizáveis.</text>
    <rect x="42" y="188" width="132" height="6" rx="3" fill="#00D1FF"/>
  </g>

  <g transform="translate(502 436)" filter="url(#shadow)">
    <rect width="396" height="222" rx="24" fill="#0B1229" stroke="#5646C4"/>
    <text x="42" y="64" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="700" fill="#D0B4FF">Branding</text>
    <text x="42" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#EADFFF">Identidade consistente em</text>
    <text x="42" y="136" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#EADFFF">Plymouth, GRUB, GDM,</text>
    <text x="42" y="168" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#EADFFF">wallpaper e experiência do SO.</text>
    <rect x="42" y="188" width="132" height="6" rx="3" fill="#8A5CFF"/>
  </g>

  <g transform="translate(928 436)" filter="url(#shadow)">
    <rect width="396" height="222" rx="24" fill="#091728" stroke="#1E5E95"/>
    <text x="42" y="64" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="700" fill="#8EDBFF">IA local / Brain</text>
    <text x="42" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#D5EBFF">Ollama, LightRAG e</text>
    <text x="42" y="136" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#D5EBFF">Kryonix Brain API para</text>
    <text x="42" y="168" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#D5EBFF">privacidade e automação local.</text>
    <rect x="42" y="188" width="132" height="6" rx="3" fill="#00D1FF"/>
  </g>

  <g transform="translate(76 718)">
    <rect width="1248" height="96" rx="22" fill="#081323" stroke="#2C4F7C"/>
    <text x="32" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#8EDBFF">Hosts</text>
    <text x="170" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="#EAF7FF">inspiron • inspiron-nina • glacier • iso</text>
    <text x="32" y="74" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#C8A9FF">CLI</text>
    <text x="170" y="74" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="#EAF7FF">kryonix switch • boot • home • diff • doctor • check • fmt • iso</text>
  </g>
</svg>